name: Move LeetCode Files

on:
  push:
    branches: ["main"]

jobs:
  move:
    runs-on: ubuntu-latest

    # 무한 루프 방지
    if: "!contains(github.event.head_commit.message, 'Auto move')"

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # rebase 가능하게 전체 히스토리 가져오기

      - name: Move LeetHub files
        run: |
          mkdir -p LeetCode
          
          for dir in */ ; do
            if [[ "$dir" != "LeetCode/" && "$dir" =~ [0-9] ]]; then
              mv "$dir" LeetCode/
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          # 변경 없으면 skip
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto move LeetHub files"

          # 최신 기준으로 rebase
          git pull origin main --rebase

          git push origin main
