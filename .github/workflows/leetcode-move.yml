name: Move LeetCode Files

on:
  push:
    branches: ["main"]

jobs:
  move:
    runs-on: ubuntu-latest

    # 무한 루프 방지
    if: "!contains(github.event.head_commit.message, 'Auto move')"

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Move LeetHub files
        run: |
          mkdir -p LeetCode
          
          for dir in */ ; do
            # LeetCode 폴더 제외 + 숫자로 시작하는 폴더만 처리
            if [[ "$dir" != "LeetCode/" && "$dir" =~ ^[0-9] ]]; then
              target="LeetCode/${dir%/}"

              # 이미 존재하면 삭제 (충돌 방지)
              rm -rf "$target"

              mv "$dir" LeetCode/
            fi
          done

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          # 변경 없으면 종료
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto move LeetHub files"

          # rebase 실패 대비
          git pull origin main --rebase || echo "Rebase skipped"

          git push origin main
